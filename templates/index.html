<!DOCTYPE html>
<html>
<head>
    <title>Screenly - AI Resume Analyzer</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        h1 {
            margin-bottom: 5px;
        }

        .container {
            width: 40%;
            margin: auto;
            margin-top: 80px;
            background: rgba(30, 41, 59, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.6);
            text-align: center;
            backdrop-filter: blur(12px);
        }

        textarea {
            width: 95%;
            height: 130px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            margin-top: 15px;
            background: #334155;
            color: white;
            resize: none;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        input[type="file"] {
            margin-top: 20px;
            color: #cbd5f5;
        }

        .file-info {
            margin-top: 10px;
            font-size: 12px;
            color: #94a3b8;
        }

        button {
            margin-top: 20px;
            padding: 14px 25px;
            background: linear-gradient(90deg, #6366f1, #22c55e);
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.95;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
        }

        .loading {
            display: none;
            margin-top: 15px;
            color: #22c55e;
        }

        .spinner {
            border: 4px solid #334155;
            border-top: 4px solid #22c55e;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tips {
            text-align: left;
            font-size: 12px;
            margin-top: 15px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1> Screenly Resume Analyzer</h1>
        <p class="subtitle">Upload resumes & get intelligent ranking with AI + ATS scoring</p>

        <form action="/" method="POST" enctype="multipart/form-data" onsubmit="showLoading()">
            
            <textarea name="job_description" placeholder="📌 Paste Job Description here..." required></textarea>

            <br>

            <input type="file" name="resumes" id="fileInput" multiple required onchange="showFiles()">

            <div class="file-info" id="fileInfo">No files selected</div>

            <button type="submit">⚡ Analyze Resumes</button>

            <div class="loading" id="loadingBox">
                <div class="spinner"></div>
                ⏳ Analyzing resumes using AI...
            </div>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

        </form>

        <div class="tips">
            💡 Tips:
            <ul>
                <li>Upload PDF or DOCX resumes</li>
                <li>Provide a clear job description</li>
                <li>More detailed JD = better ranking</li>
            </ul>
        </div>
    </div>

    <script>
        function showLoading() {
            document.getElementById("loadingBox").style.display = "block";
        }

        function showFiles() {
            const input = document.getElementById("fileInput");
            const fileInfo = document.getElementById("fileInfo");

            if (input.files.length > 0) {
                let names = [];
                for (let i = 0; i < input.files.length; i++) {
                    names.push(input.files[i].name);
                }
                fileInfo.innerText = "Selected: " + names.join(", ");
            } else {
                fileInfo.innerText = "No files selected";
            }
        }
    </script>

</body>
</html>
